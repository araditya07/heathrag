# Fly.io app config for HealthRAG backend.
# Run `flyctl launch --no-deploy` once to claim a unique app name, then
# `flyctl secrets set …` to wire env vars, then `flyctl deploy`.

app = "healthrag-api"
primary_region = "iad"        # change to "bom" (Mumbai) if you'd rather host in India
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  # GEMINI_MODEL and other knobs can live in env too, or be set via flyctl secrets.
  GEMINI_MODEL = "gemini-2.5-flash"
  EMBEDDING_MODEL = "sentence-transformers/all-MiniLM-L6-v2"
  RERANKER_MODEL = "cross-encoder/ms-marco-MiniLM-L-6-v2"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024            # torch + sentence-transformers needs ~700 MB resident
