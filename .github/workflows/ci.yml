name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python compile + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lightweight deps for compile-check
        # We don't install torch / sentence-transformers in CI — the goal
        # is fast syntax + import validation, not full env. Heavy deps are
        # already validated by the HF Spaces build.
        run: |
          python -m pip install --upgrade pip
          pip install pydantic python-dotenv supabase fastapi tiktoken \
            tenacity beautifulsoup4 markdownify requests pyyaml \
            tqdm uvicorn pdfplumber

      - name: Compile all Python sources
        run: |
          python -m compileall -q src scripts

  frontend:
    name: Frontend TypeScript + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Report bundle size
        run: |
          du -sh dist/assets/* | sort -k1 -h
